services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: web-llm-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    working_dir: /app
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-llm-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - web-llm-network
    stdin_open: true
    tty: true

networks:
  web-llm-network:
    driver: bridge
