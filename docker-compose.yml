version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: web-llm-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./data:/app/data
      - ./agent:/app/agent
      - ./classifier:/app/classifier
      - ./crawler:/app/crawler
      - ./relevance_model:/app/relevance_model
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - web-llm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-llm-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - web-llm-network
    stdin_open: true
    tty: true

networks:
  web-llm-network:
    driver: bridge
